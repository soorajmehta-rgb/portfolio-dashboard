<main class="main">
 
<div class="fx">
  <div><div class="fx-l">USD &#8594; INR</div><div class="fx-v">&#8377;{usd_inr}</div></div>
  <div class="dv" style="height:24px"></div>
  <div><div class="fx-l">AED &#8594; INR</div><div class="fx-v">&#8377;{aed_inr}</div></div>
  <div class="dv" style="height:24px"></div>
  <div><div class="fx-l">Crypto</div><div class="fx-v" style="font-size:13px">USD prices &#215; &#8377;{usd_inr}</div></div>
  <div style="margin-left:auto;font-family:monospace;font-size:9px;color:#4a6880">Auto-updated daily at 5am GST via GitHub Actions + Yahoo Finance + CoinGecko</div>
</div>
 
<div class="big">
  <div class="bc" style="border-left:3px solid #1ed760"><div class="bc-l">Total Net Worth</div><div class="bc-v g">{L(total_inr)}</div><div class="bc-s">All 5 asset classes</div></div>
  <div class="bc" style="border-left:3px solid #42a5f5"><div class="bc-l">US Stocks ({pct(us_total_inr)})</div><div class="bc-v bl">{L(us_total_inr)}</div><div class="bc-s">${us_total_usd:,.0f} &times; &#8377;{usd_inr}</div></div>
  <div class="bc" style="border-left:3px solid #f5a623"><div class="bc-l">India Stocks ({pct(in_total_inr)})</div><div class="bc-v y">{L(in_total_inr)}</div><div class="bc-s">NSE previous close</div></div>
  <div class="bc" style="border-left:3px solid #1ed760"><div class="bc-l">India MFs ({pct(mf_inr)})</div><div class="bc-v g">{L(mf_inr)}</div><div class="bc-s">9 funds &middot; &#8377;14.11L invested</div></div>
  <div class="bc" style="border-left:3px solid #9c6af0"><div class="bc-l">Crypto ({pct(cr_total_inr)})</div><div class="bc-v pu">{L(cr_total_inr)}</div><div class="bc-s">${cr_total_usd:,.0f} USD</div></div>
  <div class="bc" style="border-left:3px solid #f04f5a"><div class="bc-l">Commodities ({pct(cm_total_inr)})</div><div class="bc-v r">{L(cm_total_inr)}</div><div class="bc-s">${cm_total_usd:,.0f} USD</div></div>
</div>
 
<div class="alloc">
  <div style="font-family:monospace;font-size:8px;color:#4a6880;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Asset Allocation</div>
  <div class="pie">
    <div style="flex:{p_us:.1f};background:#42a5f5"></div>
    <div style="flex:{p_in:.1f};background:#f5a623"></div>
    <div style="flex:{p_mf:.1f};background:#1ed760"></div>
    <div style="flex:{p_cr:.1f};background:#9c6af0"></div>
    <div style="flex:{p_cm:.1f};background:#f04f5a"></div>
  </div>
  <div class="pie-leg">
    <div class="pl"><div class="dot" style="background:#42a5f5"></div>US Stocks {p_us:.1f}%</div>
    <div class="pl"><div class="dot" style="background:#f5a623"></div>India Stocks {p_in:.1f}%</div>
    <div class="pl"><div class="dot" style="background:#1ed760"></div>India MFs {p_mf:.1f}%</div>
    <div class="pl"><div class="dot" style="background:#9c6af0"></div>Crypto {p_cr:.1f}%</div>
    <div class="pl"><div class="dot" style="background:#f04f5a"></div>Commodities {p_cm:.1f}%</div>
  </div>
  <div class="br"><div class="bl2">US Stocks (${us_total_usd:,.0f})</div><div class="bt"><div class="bf" style="width:{p_us:.1f}%;background:#42a5f5"></div></div><div class="bv bl">{L(us_total_inr)}</div><div class="bp">{p_us:.1f}%</div></div>
  <div class="br"><div class="bl2">India Stocks</div><div class="bt"><div class="bf" style="width:{p_in:.1f}%;background:#f5a623"></div></div><div class="bv y">{L(in_total_inr)}</div><div class="bp">{p_in:.1f}%</div></div>
  <div class="br"><div class="bl2">India MFs</div><div class="bt"><div class="bf" style="width:{p_mf:.1f}%;background:#1ed760"></div></div><div class="bv g">{L(mf_inr)}</div><div class="bp">{p_mf:.1f}%</div></div>
  <div class="br"><div class="bl2">Crypto (${cr_total_usd:,.0f})</div><div class="bt"><div class="bf" style="width:{p_cr:.1f}%;background:#9c6af0"></div></div><div class="bv pu">{L(cr_total_inr)}</div><div class="bp">{p_cr:.1f}%</div></div>
  <div class="br"><div class="bl2">Commodities (${cm_total_usd:,.0f})</div><div class="bt"><div class="bf" style="width:{p_cm:.1f}%;background:#f04f5a"></div></div><div class="bv r">{L(cm_total_inr)}</div><div class="bp">{p_cm:.1f}%</div></div>
</div>
 
<h2>&#127482;&#127480; US Stock Portfolio &mdash; {L(us_total_inr)} (${us_total_usd:,.0f})</h2>
<div class="tw"><table class="tbl">
<thead><tr><th>Ticker</th><th>Company</th><th>Shares</th><th>Price (USD)</th><th>Value (USD)</th><th>Value (INR)</th></tr></thead>
<tbody>{us_rows}</tbody>
<tfoot><tr><td colspan="4"><strong>TOTAL</strong></td><td class="bl"><strong>${us_total_usd:,.0f}</strong></td><td class="bl"><strong>{L(us_total_inr)}</strong></td></tr></tfoot>
</table></div>
 
<h2>&#127470;&#127475; India Stock Portfolio &mdash; {L(in_total_inr)}</h2>
<div class="tw"><table class="tbl">
<thead><tr><th>Symbol</th><th>Company</th><th>Sector</th><th>Price (INR)</th><th>Value (INR)</th></tr></thead>
<tbody>{in_rows}</tbody>
<tfoot><tr><td colspan="4"><strong>TOTAL</strong></td><td class="y"><strong>{L(in_total_inr)}</strong></td></tr></tfoot>
</table></div>
 
<h2>&#8383; Crypto &mdash; {L(cr_total_inr)} (${cr_total_usd:,.0f})</h2>
<div class="tw"><table class="tbl">
<thead><tr><th>Coin</th><th>Name</th><th>Quantity</th><th>Price (USD)</th><th>Value (USD)</th><th>Value (INR)</th></tr></thead>
<tbody>{cr_rows}</tbody>
<tfoot><tr><td colspan="4"><strong>TOTAL</strong></td><td class="pu"><strong>${cr_total_usd:,.0f}</strong></td><td class="pu"><strong>{L(cr_total_inr)}</strong></td></tr></tfoot>
</table></div>
 
<h2>&#129351; Commodity ETFs &mdash; {L(cm_total_inr)} (${cm_total_usd:,.0f})</h2>
<div class="tw"><table class="tbl">
<thead><tr><th>Ticker</th><th>Name</th><th>Shares</th><th>Price (USD)</th><th>Value (USD)</th><th>Value (INR)</th></tr></thead>
<tbody>{cm_rows}</tbody>
<tfoot><tr><td colspan="4"><strong>TOTAL</strong></td><td class="r"><strong>${cm_total_usd:,.0f}</strong></td><td class="r"><strong>{L(cm_total_inr)}</strong></td></tr></tfoot>
</table></div>
 
<div style="font-family:monospace;font-size:8.5px;color:#2a3f55;padding:10px 0;border-top:1px solid #1a2840;margin-top:16px">
  Auto-generated by portfolio-updater.py &middot; Data: Yahoo Finance (stocks/FX) + CoinGecko (crypto) &middot; Updated: {today} &middot; USD/INR &#8377;{usd_inr} &middot; AED/INR &#8377;{aed_inr} &middot; MF values manually updated &middot; Not investment advice
</div>
</main>
</body>
</html>"""
 
    with open("docs/index.html", "w", encoding="utf-8") as f:
        f.write(html)
    print(f"\nDone. docs/index.html written ({len(html):,} bytes)")
 
if __name__ == "__main__":
    os.makedirs("docs", exist_ok=True)
    main()
