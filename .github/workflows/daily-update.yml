# ── PRICE FETCHER ─────────────────────────────────────────────────────────────
 
def fetch_yahoo(symbol, suffix=""):
    """Fetch price from Yahoo Finance. suffix='' for US, '.NS' for NSE India"""
    full = symbol + suffix
    url = f"https://query1.finance.yahoo.com/v8/finance/chart/{urllib.parse.quote(full)}?interval=1d&range=5d"
    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
    try:
        with urllib.request.urlopen(req, timeout=10) as r:
            data = json.loads(r.read())
        closes = data["chart"]["result"][0]["indicators"]["quote"][0]["close"]
        closes = [c for c in closes if c is not None]
        return round(closes[-1], 2) if closes else None
    except Exception as e:
        print(f"  WARN: {full} failed — {e}")
        return None
 
def fetch_crypto(symbol):
    """Fetch crypto price from CoinGecko (free, no API key)"""
    ids = {"BTC": "bitcoin", "ETH": "ethereum", "XRP": "ripple",
           "SOL": "solana", "POL": "matic-network"}
    cg_id = ids.get(symbol)
    if not cg_id:
        return None
    url = f"https://api.coingecko.com/api/v3/simple/price?ids={cg_id}&vs_currencies=usd"
    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
    try:
        with urllib.request.urlopen(req, timeout=10) as r:
            data = json.loads(r.read())
        return data[cg_id]["usd"]
    except Exception as e:
        print(f"  WARN: Crypto {symbol} failed — {e}")
        return None
 
def fetch_fx(pair):
    """Fetch FX rate from Yahoo Finance"""
    url = f"https://query1.finance.yahoo.com/v8/finance/chart/{pair}=X?interval=1d&range=5d"
    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
    try:
        with urllib.request.urlopen(req, timeout=10) as r:
            data = json.loads(r.read())
        closes = data["chart"]["result"][0]["indicators"]["quote"][0]["close"]
        closes = [c for c in closes if c is not None]
        return round(closes[-1], 2) if closes else None
    except Exception as e:
        print(f"  WARN: FX {pair} failed — {e}")
        return None
 
# ── MAIN ───────────────────────────────────────────────────────────────────────
 
def main():
    today = datetime.datetime.utcnow().strftime("%B %d, %Y")
    print(f"=== Portfolio Dashboard Updater — {today} ===\n")
 
    # FX Rates
    print("Fetching FX rates...")
    usd_inr = fetch_fx("USDINR") or 95.20
    aed_inr = fetch_fx("AEDINR") or 25.73
    print(f"  USD/INR: ₹{usd_inr}  AED/INR: ₹{aed_inr}\n")
 
    # US Stocks
    print("Fetching US stock prices...")
    us_prices = {}
    for sym in US_STOCKS:
        p = fetch_yahoo(sym)
        us_prices[sym] = p
        print(f"  {sym}: ${p}")
        time.sleep(0.3)
 
    # Commodity ETFs
    print("\nFetching commodity ETF prices...")
    cm_prices = {}
    for sym in COMMODITY_ETFS:
        p = fetch_yahoo(sym)
        cm_prices[sym] = p
        print(f"  {sym}: ${p}")
        time.sleep(0.3)
 
    # India Stocks
    print("\nFetching India NSE prices...")
    in_prices = {}
    for sym in INDIA_STOCKS:
        p = fetch_yahoo(sym, ".NS")
        in_prices[sym] = p
        print(f"  {sym}.NS: ₹{p}")
        time.sleep(0.3)
 
    # Crypto
    print("\nFetching crypto prices...")
    cr_prices = {}
    for sym in CRYPTO:
        p = fetch_crypto(sym)
        cr_prices[sym] = p
        print(f"  {sym}: ${p}")
        time.sleep(0.5)
 
    # ── CALCULATIONS ───────────────────────────────────────────────────────────
 
    us_total_usd = sum(
        (us_prices.get(s) or 0) * US_STOCKS[s]["shares"]
        for s in US_STOCKS
